name: Deploy su GitHub Pages

on:
  # Pubblica ad ogni push su main
  push:
    branches: [main]
  # Permette l'avvio manuale dalla tab Actions
  workflow_dispatch:

# Permessi necessari a deploy-pages (OIDC)
permissions:
  contents: read
  pages: write
  id-token: write

# Un solo deploy alla volta; non annulla quelli in corso
concurrency:
  group: pages
  cancel-in-progress: false

# Il progetto sta nella sottocartella langolo-di-nadia/ (la root del repo è
# angolo_di_nadia/). I comandi npm girano quindi in quella cartella.
defaults:
  run:
    working-directory: langolo-di-nadia

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: langolo-di-nadia/package-lock.json

      - name: Installa dipendenze
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Abilita GitHub Pages (source = GitHub Actions) se non già attivo,
          # senza doverlo fare a mano dalle Settings del repo.
          enablement: true

      - name: Carica artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: langolo-di-nadia/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
